[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Librerie (PlatformIO le scarica automaticamente)
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0

; Velocità Serial Monitor
monitor_speed = 115200

; Upload via USB
upload_speed = 921600