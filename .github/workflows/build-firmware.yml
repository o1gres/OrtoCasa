name: Build & Release Firmware ESP32

# Si attiva quando si fa push di un tag versione tipo v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del codice
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Python (richiesto da PlatformIO)
      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installa PlatformIO
      - name: Installa PlatformIO
        run: pip install platformio

      # 4. Crea config.h dai GitHub Secrets
      - name: Crea config.h dai secrets
        run: |
          cat > irrigazione_esp32/config.h << EOF
          #define WIFI_SSID     "${{ secrets.WIFI_SSID }}"
          #define WIFI_PASSWORD "${{ secrets.WIFI_PASSWORD }}"
          #define MQTT_BROKER   "${{ secrets.MQTT_BROKER }}"
          #define MQTT_PORT     1883
          #define MQTT_USER     "${{ secrets.MQTT_USER }}"
          #define MQTT_PASS     "${{ secrets.MQTT_PASS }}"
          #define GITHUB_USER   "${{ github.repository_owner }}"
          #define GITHUB_REPO   "${{ github.event.repository.name }}"
          EOF

      # 5. Aggiorna FIRMWARE_VERSION nel main.cpp con il tag corrente
      #    es: tag v1.2.3 → versione "1.2.3"
      - name: Aggiorna versione nel firmware
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/#define FIRMWARE_VERSION \".*\"/#define FIRMWARE_VERSION \"${VERSION}\"/" \
            irrigazione_esp32/src/main.cpp
          echo "Versione firmware impostata: ${VERSION}"

      # 6. Compila con PlatformIO
      - name: Compila firmware
        run: |
          cd irrigazione_esp32
          platformio run --environment esp32dev

      # 7. Copia il .bin con nome fisso (l'ESP32 scarica sempre questo URL)
      - name: Prepara artefatto
        run: |
          cp irrigazione_esp32/.pio/build/esp32dev/firmware.bin irrigazione_esp32.bin
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "{\"version\": \"${VERSION}\", \"notes\": \"Release ${VERSION}\"}" \
            > firmware/version.json

      # 8. Commit del version.json aggiornato su master
      - name: Aggiorna version.json su master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "{\"version\": \"${VERSION}\", \"notes\": \"Release ${VERSION}\"}" \
            > firmware/version.json
          git add firmware/version.json
          git commit -m "chore: aggiorna version.json a ${{ github.ref_name }}" || echo "Nessuna modifica"
          git push origin HEAD:master

      # 9. Crea la GitHub Release e carica il .bin
      - name: Crea Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: irrigazione_esp32.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
